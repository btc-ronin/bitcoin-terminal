<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitcoin Terminal</title>
  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="brand-title">BITCOIN TERMINAL</div>
      <div class="brand-subtitle">Bitcoin market intelligence</div>
    </div>

    <div id="priceBox" class="price-box">Cargando BTC...</div>
  </header>

  <main class="container">

    <section class="metrics-grid">
      <div class="metric-card panel">
        <div class="metric-label">Precio BTC</div>
        <div class="metric-value" id="metricPrice">--</div>
      </div>

      <div class="metric-card panel">
        <div class="metric-label">Cambio 24h</div>
        <div class="metric-value" id="metricChange">--</div>
      </div>

      <div class="metric-card panel">
        <div class="metric-label">Market Cap</div>
        <div class="metric-value" id="metricCap">--</div>
      </div>

      <div class="metric-card panel">
        <div class="metric-label">Precio EUR</div>
        <div class="metric-value" id="metricEur">--</div>
      </div>

      <div class="metric-card panel">
        <div class="metric-label">ATH</div>
        <div class="metric-value" id="metricAth">--</div>
      </div>

      <div class="metric-card panel">
        <div class="metric-label">Volumen 24h</div>
        <div class="metric-value" id="metricVolume">--</div>
      </div>

      <div class="metric-card panel">
        <div class="metric-label">Supply circulante</div>
        <div class="metric-value" id="metricSupply">--</div>
      </div>

      <div class="metric-card panel">
        <div class="metric-label">ATH drawdown</div>
        <div class="metric-value" id="metricAthChange">--</div>
      </div>
    </section>

    <section class="panel chart-panel">
      <div class="section-head">
        <h2>Gráfico BTC</h2>
        <div class="section-tag">Live market</div>
      </div>

      <div class="chart-wrap">
        <div class="tradingview-widget-container">
          <div id="tradingview_btc"></div>
          <script src="https://s3.tradingview.com/tv.js"></script>
          <script>
            new TradingView.widget({
              width: "100%",
              height: 650,
              symbol: "BINANCE:BTCUSDT",
              interval: "60",
              timezone: "Europe/Madrid",
              theme: "dark",
              style: "1",
              locale: "es",
              toolbar_bg: "#0b0f16",
              enable_publishing: false,
              hide_top_toolbar: false,
              hide_legend: false,
              save_image: false,
              container_id: "tradingview_btc"
            });
          </script>
        </div>
      </div>
    </section>

    <section class="panel news-panel">
      <div class="section-head">
        <h2>Últimas noticias</h2>
        <div class="section-tag">Bitcoin only</div>
      </div>

      <div id="newsList" class="news-grid">
        Cargando noticias...
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
