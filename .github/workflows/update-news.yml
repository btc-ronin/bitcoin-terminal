name: Update Bitcoin News

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install feedparser
        run: pip install feedparser

      - name: Generate news.json
        run: |
          python << 'EOF'
          import json
          import feedparser

          feeds = [
              ("Bitcoin Magazine", "https://bitcoinmagazine.com/.rss/full/"),
              ("CoinDesk", "https://www.coindesk.com/arc/outboundfeeds/rss/"),
              ("Blockworks", "https://blockworks.co/feed")
          ]

          news = []

          for source, url in feeds:
              try:
                  feed = feedparser.parse(url)

                  for entry in feed.entries[:6]:
                      title = entry.get("title", "").strip()
                      link = entry.get("link", "").strip()
                      summary = entry.get("summary", "").strip()
                      description = entry.get("description", "").strip()

                      if title and link:
                          news.append({
                              "title": title,
                              "link": link,
                              "source": source,
                              "summary": summary,
                              "description": description
                          })

              except Exception as e:
                  print(f"Error en {source}: {e}")

          seen = set()
          clean_news = []

          for item in news:
              if item["link"] not in seen:
                  clean_news.append(item)
                  seen.add(item["link"])

          with open("news.json", "w", encoding="utf-8") as f:
              json.dump(clean_news[:12], f, ensure_ascii=False, indent=2)

          print(f"Noticias guardadas: {len(clean_news[:12])}")
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "update news"
          git push
